workload:
  iteration_space_shape:
    a: 0 <= a < 128
    b: 0 <= b < 128
    c: 0 <= c < 128
    d: 0 <= d < 128
    e: 0 <= e < 128
    f: 0 <= f < 128
    g: 0 <= g < 128
    h: 0 <= h < 128
    i: 0 <= i < 128
  bits_per_value: {All: 8}

  einsums:
  - name: AB
    tensor_accesses:
    - {name: A, projection: [a, b]}
    - {name: B, projection: [b, c]}
    - {name: AB, projection: [a, c], output: True}
    renames: {input: A}

  - name: ABC
    tensor_accesses:
    - {name: AB, projection: [a, c]}
    - {name: C, projection: [c, d]}
    - {name: ABC, projection: [a, d], output: True}
    renames: {input: AB}

  - name: EF
    tensor_accesses:
    - {name: E, projection: [d, f]}
    - {name: F, projection: [f, g]}
    - {name: EF, projection: [d, g], output: True}
    renames: {input: E}

  - name: EFG
    tensor_accesses:
    - {name: EF, projection: [d, g]}
    - {name: G, projection: [g, h]}
    - {name: EFG, projection: [d, h], output: True}
    renames: {input: EF}

  - name: OUT
    tensor_accesses:
    - {name: ABC, projection: [a, d]}
    - {name: EFG, projection: [d, h]}
    - {name: OUT, projection: [a, h], output: True}
    renames: {input: ABC}

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1
