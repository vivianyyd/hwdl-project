workload:
  iteration_space_shape:
    m:  0 <= m  < 128
    n: 0 <= n < 128
    k: 0 <= k < 128
  bits_per_value: {All: 8}


  einsums:
  - name: E4
    tensor_accesses:
    - {name: G, projection: [n, k]}
    - {name: I, projection: [k]}
    - {name: H, projection: [k], output: True}
    renames: {input: G}

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1
