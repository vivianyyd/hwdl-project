workload:
  iteration_space_shape:
    m:  0 <= m  < 64
    n: 0 <= n < 49152
    k: 0 <= k < 64
  bits_per_value: {All: 8}


  einsums:
  - name: Matmul1
    tensor_accesses:
    - {name: A, projection: [m, n]}
    - {name: B, projection: [n, k]}
    - {name: C, projection: [m, k], output: True}
    renames: {input: A}

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1
