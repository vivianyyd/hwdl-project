workload:
  iteration_space_shape:
    a: 0 <= a < 128
    b: 0 <= b < 128
    c: 0 <= c < 128
    e: 0 <= e < 128
    f: 0 <= f < 128
    g: 0 <= g < 128
    h: 0 <= h < 128
  bits_per_value: {All: 8}

  einsums:

  - name: Y1
    tensor_accesses:
    - {name: A1, projection: [c, a]}
    - {name: Y0, projection: [a]}
    - {name: Y1, projection: [c], output: True}
    renames: {input: A1}

  - name: Y2
    tensor_accesses:
    - {name: A2, projection: [e, c]}
    - {name: Y1, projection: [c]}
    - {name: Y2, projection: [e], output: True}
    renames: {input: A2}

  - name: Z1
    tensor_accesses:
    - {name: B1, projection: [h, f]}
    - {name: Z0, projection: [f]}
    - {name: Z1, projection: [h], output: True}
    renames: {input: B1}

  - name: Z2
    tensor_accesses:
    - {name: B2, projection: [e, h]}
    - {name: Z1, projection: [h]}
    - {name: Z2, projection: [e], output: True}
    renames: {input: B2}

  - name: OUT
    tensor_accesses:
    - {name: Y2, projection: [e]}
    - {name: Z2, projection: [e]}
    - {name: OUT, projection: [e], output: True}
    renames: {input: Y2}

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1
