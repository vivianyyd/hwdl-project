workload:
  iteration_space_shape:
    m:  0 <= m  < 128
    n: 0 <= n < 128
    k: 0 <= k < 128
  bits_per_value: {All: 8}

  einsums:
  - name: Y0
    tensor_accesses:
    - {name: A0, projection: [m, n]}
    - {name: X0, projection: [n]}
    - {name: Y0, projection: [m], output: True}
    renames: {input: A0}
  
  - name: Y1
    tensor_accesses:
    - {name: A1, projection: [m, n]}
    - {name: Y0, projection: [n]}
    - {name: Y1, projection: [m], output: True}
    renames: {input: A1}
  
  - name: Y2
    tensor_accesses:
    - {name: A2, projection: [m, n]}
    - {name: Y1, projection: [n]}
    - {name: Y2, projection: [m], output: True}
    renames: {input: A2}
  
  - name: Z0
    tensor_accesses:
    - {name: B0, projection: [m, n]}
    - {name: X1, projection: [n]}
    - {name: Z0, projection: [m], output: True}
    renames: {input: B0}
  
  - name: Z1
    tensor_accesses:
    - {name: B1, projection: [m, n]}
    - {name: Z0, projection: [n]}
    - {name: Z1, projection: [m], output: True}
    renames: {input: B1}
  
  - name: Z2
    tensor_accesses:
    - {name: B2, projection: [m, n]}
    - {name: Z1, projection: [n]}
    - {name: Z2, projection: [m], output: True}
    renames: {input: B2}
  
  - name: OUT
    tensor_accesses:
    - {name: Y2, projection: [m]}
    - {name: Z2, projection: [m]}
    - {name: OUT, projection: [m], output: True}
    renames: {input: Y2}

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1
