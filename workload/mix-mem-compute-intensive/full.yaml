workload:
  iteration_space_shape:
    a: 0 <= a < 128
    b: 0 <= b < 128
    c: 0 <= c < 128
    d: 0 <= d < 128
    e: 0 <= e < 128
    f: 0 <= f < 128
    g: 0 <= g < 128
    h: 0 <= h < 128
  bits_per_value: {All: 8}

  einsums:
  # --- left side: a few matmuls ---
  - name: AB
    tensor_accesses:
    - {name: A, projection: [a, b]}
    - {name: B, projection: [b, c]}
    - {name: AB, projection: [a, c], output: True}
    renames: {input: A}

  - name: ABC
    tensor_accesses:
    - {name: AB, projection: [a, c]}
    - {name: C, projection: [c, d]}
    - {name: ABC, projection: [a, d], output: True}
    renames: {input: AB}

  - name: ABCD
    tensor_accesses:
    - {name: ABC, projection: [a, d]}
    - {name: D, projection: [d, e]}
    - {name: ABCD, projection: [a, e], output: True}
    renames: {input: ABC}

  # --- right side: a few matvecs ---
  - name: Y0
    tensor_accesses:
    - {name: E0, projection: [f, g]}
    - {name: X0, projection: [g]}
    - {name: Y0, projection: [f], output: True}
    renames: {input: E0}

  - name: Y1
    tensor_accesses:
    - {name: E1, projection: [h, f]}
    - {name: Y0, projection: [f]}
    - {name: Y1, projection: [h], output: True}
    renames: {input: E1}

  - name: Y2
    tensor_accesses:
    - {name: E2, projection: [e, h]}
    - {name: Y1, projection: [h]}
    - {name: Y2, projection: [e], output: True}
    renames: {input: E2}

  # --- join at the end: matmul (ABCD) * (Y2) ---
  - name: OUT
    tensor_accesses:
    - {name: ABCD, projection: [a, e]}
    - {name: Y2, projection: [e]}
    - {name: OUT, projection: [a], output: True}
    renames: {input: ABCD}

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1
