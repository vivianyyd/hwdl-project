workload:
  iteration_space_shape:
    m: 0 <= m  < 128
    n: 0 <= n < 128
    k: 0 <= k < 128
  bits_per_value: {All: 8}

  einsums:
  # --- left side: a few matmuls ---
  - name: ABCD
    tensor_accesses:
    - {name: ABC, projection: [m, n]}
    - {name: D, projection: [n, k]}
    - {name: ABCD, projection: [m, k], output: true}
    renames: {input: ABC}
renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1
