workload:
  iteration_space_shape:
    m: 0 <= m  < 128
    n: 0 <= n < 128
    k: 0 <= k < 128
  bits_per_value: {All: 8}

  einsums:
  # --- left side: a few matmuls ---
    - name: Y0
    tensor_accesses:
      - {name: E0, projection: [m, n]}
      - {name: X0, projection: [n]}
      - {name: Y0, projection: [m], output: true}
    renames: {input: E0}
renames:
  einsums:
    - name: default
    tensor_accesses:
      - name: input
      source: Inputs & Intermediates
      expected_count: 1
      - name: output
      source: Outputs
      expected_count: 1
      - name: weight
      source: ~(input | output)
      expected_count: 1
