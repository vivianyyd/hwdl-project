workload:
  iteration_space_shape:
    m:  0 <= m  < 128
    n: 0 <= n < 128
    k: 0 <= k < 128
  bits_per_value: {All: 8}

  einsums:
  - name: AB
    tensor_accesses:
    - {name: A, projection: [m, n]}
    - {name: B, projection: [n, k]}
    - {name: AB, projection: [m, k], output: True}
    renames: {input: A}
  
  - name: ABC
    tensor_accesses:
    - {name: AB, projection: [m, n]}
    - {name: C, projection: [n, k]}
    - {name: ABC, projection: [m, k], output: True}
    renames: {input: AB}
  
  - name: ABCD
    tensor_accesses:
    - {name: ABC, projection: [m, n]}
    - {name: D, projection: [n, k]}
    - {name: ABCD, projection: [m, k], output: True}
    renames: {input: ABC}
  
  - name: EF
    tensor_accesses:
    - {name: E, projection: [m, n]}
    - {name: F, projection: [n, k]}
    - {name: EF, projection: [m, k], output: True}
    renames: {input: E}
  
  - name: EFG
    tensor_accesses:
    - {name: EF, projection: [m, n]}
    - {name: G, projection: [n, k]}
    - {name: EFG, projection: [m, k], output: True}
    renames: {input: EF}
  
  - name: EFGH
    tensor_accesses:
    - {name: EFG, projection: [m, n]}
    - {name: H, projection: [n, k]}
    - {name: EFGH, projection: [m, k], output: True}
    renames: {input: EFG}
    
  - name: OUT
    tensor_accesses:
    - {name: ABCD, projection: [m, n]}
    - {name: EFGH, projection: [n, k]}
    - {name: OUT, projection: [m, k], output: True}
    renames: {input: ABCD}

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1
