renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1

workload:
  bits_per_value: {All: 8}

  einsums:
  - einsum: "T0[p0, q0] = I0[H: p0 + r0, W: q0 + s0] * W0[r0, s0]"
    iteration_space_shape:
    - 0 <= p0 < 32
    - 0 <= q0 < 32
    - 0 <= r0 < 3
    - 0 <= s0 < 3
    renames: {output: T0, input: I0, weight: W0}