arch:
  nodes:
  - !Memory
    name: MainMemory
    size: inf
    leak_power: 0
    area: 0 # Don't include off-chip DRAM area
    actions:
      # Upper end of the range from the TPU paper. The lower end came from their
      # reference, and they said it left out some things.
    - {name: read, energy: 7.03e-12, latency: 1 / (8 * 614e9)}
    - {name: write, energy: 7.03e-12, latency: 1 / (8 * 614e9)}
    tensors: {keep: All}

  - !Fork
    nodes: 
    - !Fanout
      name: FastPE 
      spatial:
      - {name: reuse_input, fanout: 128, may_reuse: input, min_usage: 1}
      - {name: reuse_output, fanout: 128, may_reuse: output, min_usage: 1}

    - !Compute
      name: FastMAC
      leak_power: 0
      area: 9e-11 # 90 um^2. Very rough estimate based on die photo.
      actions:
      - {name: compute, energy: 0.084e-12, latency: 1 / 1.05e9}
      enabled: len(All) == 3

  - !Fanout
    name: SlowPE 
    spatial:
    - {name: reuse_input, fanout: 128, may_reuse: input, min_usage: 1}
    - {name: reuse_output, fanout: 128, may_reuse: output, min_usage: 1}

  - !Compute
    name: SlowMAC
    leak_power: 0
    area: 9e-11 # 90 um^2. Very rough estimate based on die photo.
    actions:
    - {name: compute, energy: 0.084e-12, latency: 1 / 1.05e8}
    enabled: len(All) == 3
