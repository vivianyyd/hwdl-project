renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1

workload:
  bits_per_value: {All: 8}
  rank_sizes: {N: 8}

  einsums:
  - einsum: "T0[p0, q0, n, m0] = I0[n, c0, H: p0 * 2 + r0, W: q0 * 2 + s0] * W0[r0, s0, c0, m0]"
    iteration_space_shape:
    - 0 <= p0 < 112
    - 0 <= q0 < 112
    - 0 <= c0 < 3
    - 0 <= m0 < 64
    - 0 <= r0 < 7
    - 0 <= s0 < 7
    renames: {output: T0, input: I0, weight: W0}
  - einsum: "T1[p1, q1, n, m1] = I1[n, c1, H: p1 + r1, W: q1 + s1] * W1[r1, s1, c1, m1]"
    iteration_space_shape:
    - 0 <= p1 < 56
    - 0 <= q1 < 56
    - 0 <= c1 < 64
    - 0 <= m1 < 64
    - 0 <= r1 < 3
    - 0 <= s1 < 3
    renames: {output: T1, input: I1, weight: W1}
  - einsum: "T2[p2, q2, n, m2] = I2[n, c2, H: p2 + r2, W: q2 + s2] * W2[r2, s2, c2, m2]"
    iteration_space_shape:
    - 0 <= p2 < 56
    - 0 <= q2 < 56
    - 0 <= c2 < 64
    - 0 <= m2 < 64
    - 0 <= r2 < 3
    - 0 <= s2 < 3
    renames: {output: T2, input: I2, weight: W2}
  - einsum: "T3[p3, q3, n, m3] = I3[n, c3, H: p3 + r3, W: q3 + s3] * W3[r3, s3, c3, m3]"
    iteration_space_shape:
    - 0 <= p3 < 56
    - 0 <= q3 < 56
    - 0 <= c3 < 64
    - 0 <= m3 < 64
    - 0 <= r3 < 3
    - 0 <= s3 < 3
    renames: {output: T3, input: I3, weight: W3}
  - einsum: "T4[p4, q4, n, m4] = I4[n, c4, H: p4 + r4, W: q4 + s4] * W4[r4, s4, c4, m4]"
    iteration_space_shape:
    - 0 <= p4 < 56
    - 0 <= q4 < 56
    - 0 <= c4 < 64
    - 0 <= m4 < 64
    - 0 <= r4 < 3
    - 0 <= s4 < 3
    renames: {output: T4, input: I4, weight: W4}
  - einsum: "T5[p5, q5, n, m5] = I5[n, c5, H: p5 * 2 + r5, W: q5 * 2 + s5] * W5[r5, s5, c5, m5]"
    iteration_space_shape:
    - 0 <= p5 < 28
    - 0 <= q5 < 28
    - 0 <= c5 < 64
    - 0 <= m5 < 128
    - 0 <= r5 < 3
    - 0 <= s5 < 3
    renames: {output: T5, input: I5, weight: W5}