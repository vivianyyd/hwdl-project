arch:
  extra_attributes_for_all_component_models: {tech_node: 65e-9}
  nodes:
  - !Memory
    name: MainMemory
    size: inf
    leak_power: 0
    area: 0 # Don't include off-chip DRAM area
    component_class: LPDDR4
    total_latency: (read_actions + write_actions) / 32 / 200e6
    actions:
      # Upper end of the range from the TPU paper. The lower end came from their
      # reference, and they said it left out some things.
    - {name: read, energy: 7.03e-12}
    - {name: write, energy: 7.03e-12}
    tensors: {keep: All}

  - !Fork
    nodes: 

    - !Container
      name: FastPE 
      spatial:
      - {name: reuse_input, fanout: 14, may_reuse: input, min_usage: 1}
      - {name: reuse_output, fanout: 12, may_reuse: output, min_usage: 1}

    - !Memory # Input scratchpad
      name: FastScratchpad
      component_class: SmartBufferSRAM
      size: 16 * 220  # 12 16b entries
      tensors: {keep: All}

    - !Compute
      name: FastMAC
      leak_power: 0
      area: 9e-11 # 90 um^2. Very rough estimate based on die photo.
      actions:
      - {name: compute, energy: 0.084e-12, latency: 1 / 1.05e9}
      enabled: len(All) == 3

  - !Container
    name: SlowPE 
    spatial:
    - {name: reuse_input, fanout: 14, may_reuse: input, min_usage: 1}
    - {name: reuse_output, fanout: 12, may_reuse: output, min_usage: 1}

  - !Memory # Input scratchpad
    name: SlowScratchpad
    component_class: SmartBufferSRAM
    size: 16 * 220  # 12 16b entries
    tensors: {keep: All}
    
  - !Compute
    name: SlowMAC
    leak_power: 0
    area: 9e-11 # 90 um^2. Very rough estimate based on die photo.
    actions:
    - {name: compute, energy: 0.084e-12, latency: 1 / 1.05e8}
    enabled: len(All) == 3
